name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test(Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Smoke test
        run: |
          node dist/cli.js version
          node dist/cli.js help

  action:
    name: Action
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/action
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: test -f dist/index.js
