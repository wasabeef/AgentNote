name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - website/**
      - packages/dashboard/**
      - package.json
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - website/**
      - packages/dashboard/**
      - package.json
      - .github/workflows/docs.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix website
      - run: npm ci --prefix packages/dashboard
      - run: npm run build --prefix website
        env:
          SITE: https://wasabeef.github.io
          BASE: /AgentNote
      - run: npm run build --prefix packages/dashboard
        env:
          SITE: https://wasabeef.github.io
          BASE: /AgentNote/dashboard
      - run: |
          rm -rf .pages
          mkdir -p .pages/dashboard
          cp -R website/dist/. .pages/
          cp -R packages/dashboard/dist/. .pages/dashboard/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
