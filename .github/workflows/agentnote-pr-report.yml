## Agentnote PR Report
##
## Posts an AI session report to the PR description(or as a comment).
##
## Usage: Copy this file to your repo's .github/workflows/ directory.

name: Agentnote PR Report

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  agentnote-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build CLI
        run: npm ci && npm -w packages/cli run build

      - uses: ./
        id: report
        with:
          output: description
          format: chat
