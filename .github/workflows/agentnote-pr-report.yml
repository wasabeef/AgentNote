## Agentnote PR Report
##
## Posts an AI session report to the PR and exposes structured data as outputs.
##
## Usage: Copy this file to your repo's .github/workflows/ directory.

name: Agentnote PR Report

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  agentnote-report:
    runs-on: ubuntu-latest
    outputs:
      overall_ai_ratio: ${{ steps.report.outputs.overall_ai_ratio }}
      tracked_commits: ${{ steps.report.outputs.tracked_commits }}
      total_commits: ${{ steps.report.outputs.total_commits }}
      total_prompts: ${{ steps.report.outputs.total_prompts }}
      json: ${{ steps.report.outputs.json }}
      markdown: ${{ steps.report.outputs.markdown }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch agentnote notes
        run: git fetch origin refs/notes/agentnote:refs/notes/agentnote 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate report
        id: report
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"

          # JSON report
          JSON=$(npx --yes @wasabeef/agentnote pr "${BASE}" --json 2>/dev/null || echo '{}')

          if [ "$JSON" = '{}' ] || echo "$JSON" | jq -e '.error' > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract individual fields for easy access.
          echo "overall_ai_ratio=$(echo "$JSON" | jq -r '.overall_ai_ratio')" >> "$GITHUB_OUTPUT"
          echo "tracked_commits=$(echo "$JSON" | jq -r '.tracked_commits')" >> "$GITHUB_OUTPUT"
          echo "total_commits=$(echo "$JSON" | jq -r '.total_commits')" >> "$GITHUB_OUTPUT"
          echo "total_prompts=$(echo "$JSON" | jq -r '.total_prompts')" >> "$GITHUB_OUTPUT"

          # Full JSON (single line for output compatibility).
          echo "json=$(echo "$JSON" | jq -c .)" >> "$GITHUB_OUTPUT"

          # Markdown report
          MARKDOWN=$(npx --yes @wasabeef/agentnote pr "${BASE}" 2>/dev/null || echo "")
          {
            echo "markdown<<LORE_EOF"
            echo "$MARKDOWN"
            echo "LORE_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.report.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- agentnote-pr-report -->';
            const body = `${marker}\n${process.env.MARKDOWN}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          MARKDOWN: ${{ steps.report.outputs.markdown }}
