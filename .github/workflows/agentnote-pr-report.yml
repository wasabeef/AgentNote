## Agentnote PR Report
##
## Posts AI session reports to the PR.

name: Agentnote PR Report

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  agentnote-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build CLI
        run: npm ci && npm -w packages/cli run build

      - name: Chat format(comment)
        uses: ./
        with:
          output: comment
          format: chat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Table format(comment)
        uses: ./
        with:
          output: comment
          format: table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
