## Agentnote PR Report
##
## Posts an AI session report to the PR description(or as a comment).
##
## Usage: Copy this file to your repo's .github/workflows/ directory.

name: Agentnote PR Report

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  agentnote-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        id: report
        with:
          output: description
          format: chat
