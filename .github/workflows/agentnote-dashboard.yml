name: Agent Note Dashboard

on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.notes.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore Dashboard notes from gh-pages
        run: npm run dashboard:restore-notes

      - name: Update Dashboard notes from git notes
        id: notes
        env:
          NOTES_DIR: .agentnote-dashboard-notes
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: npm run dashboard:sync-notes

      - name: Build Dashboard
        if: steps.notes.outputs.should_build == 'true'
        env:
          NOTES_DIR: .agentnote-dashboard-notes
          PAGES_DIR: .pages
          PUBLIC_REPO: ${{ github.repository }}
        run: npm run dashboard:build-pages

      - name: Persist Dashboard notes to gh-pages
        if: steps.notes.outputs.should_persist == 'true'
        env:
          NOTES_DIR: .agentnote-dashboard-notes
        run: npm run dashboard:persist-notes

      - name: Upload Pages artifact
        if: steps.notes.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: .pages

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
