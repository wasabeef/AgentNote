name: "Agent Note PR Report"
description: "AI agent session tracking report for pull requests"
author: "wasabeef"

inputs:
  base:
    description: "Base branch to compare against (default: PR base)"
    required: false
    default: ""
  output:
    description: "Report destination: description or comment (default: description)"
    required: false
    default: ""
  comment:
    description: "Legacy: set to false to disable report posting"
    required: false
    default: "true"

outputs:
  overall_ai_ratio:
    description: "PR-wide AI ratio (0-100)"
  overall_method:
    description: "Attribution method: line, file, mixed, or none"
  tracked_commits:
    description: "Number of commits with agent-note data"
  total_commits:
    description: "Total commits in PR"
  total_prompts:
    description: "Total prompts across all commits"
  json:
    description: "Full structured report as JSON"
  markdown:
    description: "Rendered markdown report"

runs:
  using: "node24"
  main: "packages/action/dist/index.js"
