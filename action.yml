name: "Agent Note"
description: "AI agent session reports for pull requests and dashboard bundles"
author: "wasabeef"

inputs:
  base:
    description: "Base branch to compare against (default: PR base)"
    required: false
    default: ""
  pr_output:
    description: "PR report destination: description, comment, or none (default: description)"
    required: false
    default: ""
  output:
    description: "Legacy: PR report destination: description or comment"
    required: false
    default: ""
  comment:
    description: "Legacy: set to false to disable PR report posting"
    required: false
    default: "true"
  dashboard:
    description: "Write/update dashboard snapshot files for the current PR"
    required: false
    default: "false"
  dashboard_dir:
    description: "Directory where dashboard notes/*.json will be written"
    required: false
    default: "packages/dashboard/public"
  dashboard_url:
    description: "Public dashboard URL to link from the PR report when the dashboard is already deployed"
    required: false
    default: ""

outputs:
  overall_ai_ratio:
    description: "PR-wide AI ratio (0-100)"
  overall_method:
    description: "Attribution method: line, file, mixed, or none"
  tracked_commits:
    description: "Number of commits with agent-note data"
  total_commits:
    description: "Total commits in PR"
  total_prompts:
    description: "Total prompts across all commits"
  json:
    description: "Full structured report as JSON"
  markdown:
    description: "Rendered markdown report"
  dashboard_dir:
    description: "Dashboard snapshot directory written by the action"
  dashboard_commits:
    description: "Number of tracked commits written into the dashboard snapshot"
  dashboard_url:
    description: "Public dashboard URL linked from the PR report when explicitly configured"

runs:
  using: "node24"
  main: "packages/action/dist/index.js"
